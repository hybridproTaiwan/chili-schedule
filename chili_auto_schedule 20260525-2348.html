<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>馳立汽車｜每日排程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --blue: #1a5fd4;
    --red: #d42020;
    --black: #111111;
    --orange: #d46b00;
    --green: #1a7a3c;
    --gray: #888;
    --done-opacity: 0.35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--black);
    font-family: 'Noto Sans TC', sans-serif;
    padding: 36px 52px 28px;
    min-height: 100vh;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 3px solid var(--black);
  }
  .box-value {
    font-size: 3.2rem;
    font-weight: 900;
    color: var(--black);
    letter-spacing: .06em;
  }
  .top-item { text-align: center; }
  .schedule-list { display: flex; flex-direction: column; gap: 0; }
  .row { padding: 18px 0 14px; border-bottom: 1.5px solid #ddd; transition: opacity .3s; }
  .row.done { opacity: var(--done-opacity); }
  .row.inprogress {
    background: #f0fff5;
    border-left: 6px solid var(--green);
    padding-left: 14px;
    margin-left: -14px;
  }
  .row-line1 {
    display: flex;
    align-items: baseline;
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1.2;
    flex-wrap: wrap;
  }
  .seq     { color: var(--blue);  margin-right: 6px; }
  .plate   { color: var(--blue); }
  .sep     { color: var(--black); margin: 0 6px; font-weight: 400; font-size: 2rem; }
  .model   { color: var(--blue); }
  .mileage { color: var(--blue); }
  .time    { color: var(--red);  margin-left: 6px; }
  .new-badge {
    color: var(--orange);
    font-size: 1.1rem;
    font-weight: 700;
    margin-left: 10px;
    border: 2px solid var(--orange);
    border-radius: 6px;
    padding: 0 8px;
    vertical-align: middle;
  }
  .row-line2 {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-top: 8px;
    font-size: 1.75rem;
    font-weight: 700;
    flex-wrap: wrap;
    padding-left: 2.6rem;
  }
  .col-action  { color: var(--black); }
  .col-inspect { color: var(--green); }
  .col-history { color: var(--orange); }
  .col-dot     { color: var(--gray); font-weight: 400; font-size: 1.4rem; }
  .msg { font-size: 2rem; color: #888; padding: 40px 0; }
  .err { font-size: 1.6rem; color: #d42020; padding: 40px 0; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-item">
    <div class="box-value" id="hdr-date">—</div>
  </div>
  <div class="top-item">
    <div class="box-value" id="live-clock">—</div>
  </div>
</div>

<div class="schedule-list" id="schedule-list">
  <div class="msg">🍊 讀取行事曆中...</div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxGJbCJkX4SbWDUJPOyJMNk1tk1AvegO0Jd-F3fRVpha5_QhJIcTcXObcm6HDxHiuvp_w/exec';

var ACTION_KW  = ['機油','濾芯','煞車皮','碟盤','皮帶','火星塞','冷氣','洗','更換','保養','充電','AGM','電瓶','輪胎','鏈條','修','補','換','清','固定','線路查修','15W','20W','5W','保'];
var INSPECT_KW = ['檢查','檢測','診斷','複檢','掃碼','OBD','試車','確認','評估','查修'];

function classifyItems(raw) {
  if (!raw) return { actions: [], inspects: [] };
  var parts = raw.split(/[、，,+＋\/／]/g).map(function(s){ return s.trim(); }).filter(Boolean);
  var actions = [], inspects = [];
  for (var i=0; i<parts.length; i++) {
    var p = parts[i];
    var isI = INSPECT_KW.some(function(k){ return p.indexOf(k) >= 0; });
    if (isI) inspects.push(p); else actions.push(p);
  }
  return { actions: actions, inspects: inspects };
}

function toMin(t) { var s=t.split(':'); return parseInt(s[0])*60+parseInt(s[1]); }

function getStatus(s, e, now) {
  var n=toMin(now), sv=toMin(s), ev=toMin(e);
  if (n>=ev) return 'done';
  if (n>=sv) return 'inprogress';
  return 'upcoming';
}

function getNow() {
  var d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function renderRow(item, seq, now) {
  var status = item.isNew ? 'upcoming' : getStatus(item.timeStart, item.timeEnd, now);
  var ci = classifyItems(item.items);
  var plateTxt = item.isNew ? '???' : item.plate;
  var newBadge = item.isNew ? '<span class="new-badge">待補資料</span>' : '';
  var mileagePart = (item.mileage && item.mileage !== '—' && item.mileage !== '')
    ? '<span class="sep">－</span><span class="mileage">'+item.mileage+'</span>' : '';
  var actionTxt  = ci.actions.length  ? '<span class="col-action">'+ci.actions.join('、')+'</span>'   : '';
  var inspectTxt = ci.inspects.length ? '<span class="col-inspect">'+ci.inspects.join('、')+'</span>' : '';
  var sep1 = (actionTxt && inspectTxt) ? '<span class="col-dot">｜</span>' : '';
  var historyTxt = item.history ? '<span class="col-dot">｜</span><span class="col-history">📝 '+item.history+'</span>' : '';
  var seqChar = seq <= 20 ? '&#'+(9311+seq)+';' : seq+'.';
  var customerPart = item.customer ? item.customer+'－' : '';

  return '<div class="row '+status+'">'
    +'<div class="row-line1">'
    +'<span class="seq">'+seqChar+'</span>'
    +'<span class="plate">'+plateTxt+'</span>'+newBadge
    +'<span class="sep">－</span>'
    +'<span class="model">'+customerPart+item.model+'</span>'
    +mileagePart
    +'<span class="sep">－</span>'
    +'<span class="time">'+item.timeStart+'</span>'
    +'</div>'
    +'<div class="row-line2">'+actionTxt+sep1+inspectTxt+historyTxt+'</div>'
    +'</div>';
}

function updateClock() {
  document.getElementById('live-clock').textContent = getNow();
}

// ── JSONP 呼叫 ──
var _jsonpTimer = null;

function fetchAndRender() {
  updateClock();
  document.getElementById('schedule-list').innerHTML = '<div class="msg">🍊 讀取行事曆中...</div>';

  // 清除舊的 callback 與 script tag
  if (window._chiliCallback) { window._chiliCallback = null; }
  var old = document.getElementById('_gas_script');
  if (old) old.parentNode.removeChild(old);

  // 設定 timeout（8 秒沒回應就顯示錯誤）
  _jsonpTimer = setTimeout(function() {
    document.getElementById('schedule-list').innerHTML =
      '<div class="err">⚠️ 行事曆讀取逾時，請確認 GAS 設定是否正確</div>';
  }, 8000);

  // 定義 callback
  window._chiliCallback = function(data) {
    clearTimeout(_jsonpTimer);
    if (!data.ok) {
      document.getElementById('schedule-list').innerHTML =
        '<div class="err">⚠️ 行事曆讀取失敗：'+(data.error||'未知錯誤')+'</div>';
      return;
    }
    var events = data.events;
    if (!events || events.length === 0) {
      document.getElementById('schedule-list').innerHTML =
        '<div class="msg">今日尚無預約行程</div>';
      return;
    }
    var now = getNow();
    document.getElementById('schedule-list').innerHTML =
      events.map(function(item, i){ return renderRow(item, i+1, now); }).join('');
  };

  // 插入 script tag
  var s = document.createElement('script');
  s.id  = '_gas_script';
  s.src = GAS_URL + '?callback=_chiliCallback&t=' + Date.now();
  document.body.appendChild(s);
}

// ── Header 日期 ──
var _d = new Date();
var DAYS = ['週日','週一','週二','週三','週四','週五','週六'];
document.getElementById('hdr-date').textContent =
  (_d.getMonth()+1)+'月'+_d.getDate()+'日 '+DAYS[_d.getDay()];

// ── 啟動 ──
fetchAndRender();
setInterval(updateClock, 10000);
setInterval(fetchAndRender, 300000);
</script>
</body>
</html>
