<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!--
  馳立汽車｜每日排程系統
  橘寶製作 🍊
  更新日期：2026-05-27 23:55
  更新內容：
    1. 日期／時間改為白色
    2. 序號＋車牌＋車款：藍色粗黑體
    3. 入廠時間：紅色粗黑體
    4. 隱藏客戶名字（行事曆標題含 🍄 後的文字不顯示，含emoji本身）
    5. 施作項目：白色粗黑體，顯示於第二行，前綴 🔧
    6. 歷史備註：橘色細體，第三行，前綴 📝（備註欄 📝 後的文字）
    7. 💎 備註欄內容不顯示於投影
    8. 👁️ 標記於序號後（未來廠客）
    9. 📞 後的文字完整顯示於投影（無完整資訊客）
    10. 當前時間區段框起來（不用亮暗）
    11. 每30分鐘自動更新
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>馳立汽車｜每日排程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d0d;
    --border:  #2a2a2a;
    --blue:    #6ab0ff;
    --red:     #ff6b6b;
    --white:   #f0f0f0;
    --orange:  #ffaa44;
    --green:   #4ddd88;
    --gray:    #555;
    --done-op: 0.30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
  }

  body { padding: 2vw 3vw 2vw; }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.4vw;
    padding-bottom: 0.9vw;
    border-bottom: 0.2vw solid #444;
  }

  .top-date {
    font-size: clamp(1.5rem, 3.4vw, 3.4rem);
    font-weight: 900;
    color: var(--white);
    letter-spacing: .04em;
  }

  .top-date.tomorrow { color: var(--orange); }

  .top-time {
    font-size: clamp(1.5rem, 3.4vw, 3.4rem);
    font-weight: 900;
    color: var(--white);
    letter-spacing: .08em;
  }

  /* ── ROWS ── */
  .schedule-list { display: flex; flex-direction: column; }

  .row {
    padding: 1vw 0.8vw 0.8vw;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: border-color .3s;
    margin-bottom: 0.1vw;
  }

  /* 當前時間框：白色邊框框起來 */
  .row.inprogress {
    border: 0.2vw solid var(--white);
    border-radius: 0.5vw;
    padding: 0.9vw 1vw;
    margin: 0.3vw 0;
    background: #181818;
  }

  /* 已完成：稍微淡一點但不過暗 */
  .row.done { opacity: var(--done-op); }

  /* ── LINE 1：序號 車牌 車款 時間 ── */
  .row-line1 {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    font-size: clamp(1.1rem, 2.4vw, 2.6rem);
    font-weight: 900;
    line-height: 1.3;
  }

  .seq   { color: var(--blue); margin-right: 0.2vw; }
  .eye   { font-size: 0.85em; margin-right: 0.2vw; } /* 👁️ */
  .plate { color: var(--blue); }
  .sep   { color: #444; margin: 0 0.3vw; font-weight: 400; }
  .model { color: var(--blue); }
  .time  { color: var(--red); margin-left: 0.5vw; }

  /* 📞 客：橘色提示 */
  .tel-info {
    color: var(--orange);
    font-size: clamp(0.85rem, 1.6vw, 1.8rem);
    font-weight: 700;
    margin-left: 0.5vw;
  }

  /* ── LINE 2：施作項目 ── */
  .row-line2 {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 0.8vw;
    margin-top: 0.3vw;
    font-size: clamp(0.95rem, 1.85vw, 2rem);
    font-weight: 900;
    padding-left: 1.8vw;
    color: var(--white);
  }

  /* ── LINE 3：歷史備註 ── */
  .row-line3 {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    margin-top: 0.2vw;
    font-size: clamp(0.8rem, 1.5vw, 1.65rem);
    font-weight: 400;
    padding-left: 1.8vw;
    color: var(--orange);
  }

  .msg { font-size: clamp(1rem, 2vw, 2rem); color: #555; padding: 3vw 0; }
  .err { font-size: clamp(0.9rem, 1.8vw, 1.8rem); color: var(--red); padding: 3vw 0; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-date" id="hdr-date">—</div>
  <div class="top-time" id="live-clock">—</div>
</div>

<div class="schedule-list" id="schedule-list">
  <div class="msg">🍊 讀取行事曆中...</div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycby1Y2NsEW3Lxy8FgwuT4i6wfiiHNI3afBvTYabQ4YSiTIn-DpAntwcm5gkI-6wvYRR5rg/exec';

// ── emoji 辨識 ──
// 👁️ 未來廠客  🍄 客戶名字標記（隱藏名字）  📞 無資料客  💎 初次填單（備註不顯示）  📝 歷史備註  🔧 施作項目
var EMOJI_EYE      = '👁';   // 未來廠客
var EMOJI_MUSHROOM = '🍄';   // 隱藏名字
var EMOJI_TEL      = '📞';   // 無資料客
var EMOJI_DIAMOND  = '💎';   // 不顯示
var EMOJI_PARTY    = '🎉';   // 不顯示
var EMOJI_MEMO     = '📝';   // 顯示
var EMOJI_WRENCH   = '🔧';

function hasEmoji(str, emoji) {
  return str && str.indexOf(emoji) >= 0;
}

// 從標題抽取車牌、車款、時間、施作項目
// 格式：[emoji][車牌]-[🍄客戶名]-[車款]-[里程]-[施作項目]
// 或：[📞來電說明]-[車款]-[施作項目]
function parseTitle(title) {
  // 1. 判斷 flag
  var isEye     = hasEmoji(title, EMOJI_EYE);
  var isTel     = hasEmoji(title, EMOJI_TEL);

  // 2. 移除開頭所有 emoji（保留文字）
  var cleaned = title.replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\uFE0F\u200D]/gu, '').trim();
  // fallback for envs without unicode flag
  if (cleaned === title) {
    cleaned = title.replace(/[^\u4e00-\u9fff\uff00-\uffff\w\-]/g, function(c){
      return c.charCodeAt(0) > 255 && c.charCodeAt(0) < 0x4e00 ? '' : c;
    }).trim();
  }

  var parts = cleaned.split('-').map(function(s){ return s.trim(); }).filter(Boolean);

  var plate    = '';
  var model    = '';
  var mileage  = '';
  var items    = '';
  var telInfo  = '';

  if (isTel) {
    // 📞 格式：📞說明-車款-施作
    telInfo = parts[0] || '';
    model   = parts[1] || '';
    items   = parts.slice(2).join('-');
  } else {
    // 一般格式：車牌-[🍄名字]-車款-里程-施作
    plate = parts[0] || '';
    // parts[1] 可能是客戶名（含🍄標記已被清除，直接跳過）
    // 判斷：若 title 有 🍄，第二段是名字，跳過
    var offset = hasEmoji(title, EMOJI_MUSHROOM) ? 2 : 1;
    model   = parts[offset]     || '';
    mileage = parts[offset + 1] || '';
    items   = parts.slice(offset + 2).join('-');
  }

  return {
    plate:   plate,
    model:   model,
    mileage: mileage,
    items:   items,
    isEye:   isEye,
    isTel:   isTel,
    telInfo: telInfo,
    isNew:   (plate === '???' || plate.toUpperCase() === 'NEW')
  };
}

// 解析備註欄
// 📝 → 歷史備註（顯示）
// 💎 → 初次填單（不顯示）
// 其餘 → 顯示
function parseDescription(desc) {
  if (!desc) return { history: '', show: true };
  if (hasEmoji(desc, EMOJI_DIAMOND) || hasEmoji(desc, EMOJI_PARTY)) return { history: "", show: false };
  var text = desc.replace(/^📝\s*/, '').trim();
  return { history: text, show: true };
}

function toMin(t) {
  if (!t || t.indexOf(':') < 0) return 0;
  var s = t.split(':'); return parseInt(s[0]) * 60 + parseInt(s[1]);
}

function getStatus(s, e, now) {
  var n = toMin(now), sv = toMin(s), ev = toMin(e);
  if (n >= ev) return 'done';
  if (n >= sv) return 'inprogress';
  return 'upcoming';
}

function getNow() {
  var d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function getDisplayDate() {
  var d = new Date();
  if (d.getHours() >= 22) d.setDate(d.getDate() + 1);
  return d;
}

function formatDisplayDate(d) {
  var DAYS = ['週日','週一','週二','週三','週四','週五','週六'];
  return (d.getMonth()+1) + '月' + d.getDate() + '日　' + DAYS[d.getDay()];
}

function formatQueryDate(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function renderRow(item, seq, now) {
  // item 來自 GAS，raw 是原始標題，history 是備註欄原始文字
  var parsed  = parseTitle(item.raw || '');
  var descObj = parseDescription(item.history || '');

  var status = parsed.isNew ? 'upcoming' : getStatus(item.timeStart, item.timeEnd, now);

  // 序號 + 👁️
  var seqChar = seq <= 20 ? '&#' + (9311 + seq) + ';' : seq + '.';
  var eyeMark = parsed.isEye ? '<span class="eye">👁️</span>' : '';

  // 車牌＋車款（藍色）
  var platePart = '';
  if (parsed.isTel) {
    // 📞 客：顯示 📞+說明
    platePart = '<span class="tel-info">📞 ' + parsed.telInfo + '</span>';
  } else {
    platePart = '<span class="plate">' + (parsed.plate || '???') + '</span>'
      + '<span class="sep">－</span>'
      + '<span class="model">' + parsed.model + '</span>';
  }

  // 里程
  var mileagePart = (parsed.mileage && parsed.mileage !== '')
    ? '<span class="sep">－</span><span class="model">' + parsed.mileage + '</span>' : '';

  // 入廠時間（紅色）
  var timePart = '<span class="time">' + item.timeStart + '</span>';

  // 施作項目（白色，第二行，🔧 開頭）
  var line2 = '';
  if (parsed.items) {
    line2 = '<div class="row-line2">🔧 ' + parsed.items + '</div>';
  }

  // 歷史備註（橘色，第三行，📝 開頭）
  var line3 = '';
  if (descObj.show && descObj.history) {
    line3 = '<div class="row-line3">📝 ' + descObj.history + '</div>';
  }

  return '<div class="row ' + status + '">'
    + '<div class="row-line1">'
    + '<span class="seq">' + seqChar + '</span>'
    + eyeMark
    + platePart
    + mileagePart
    + '<span class="sep">－</span>'
    + timePart
    + '</div>'
    + line2
    + line3
    + '</div>';
}

function updateClock() {
  document.getElementById('live-clock').textContent = getNow();
}

var _jsonpTimer = null;

function fetchAndRender() {
  updateClock();
  var displayDate = getDisplayDate();
  var queryDate   = formatQueryDate(displayDate);
  var isTomorrow  = new Date().getHours() >= 22;
  var label       = formatDisplayDate(displayDate);

  var dateEl = document.getElementById('hdr-date');
  dateEl.textContent = label + (isTomorrow ? '　（明日預約）' : '');
  if (isTomorrow) dateEl.classList.add('tomorrow');
  else            dateEl.classList.remove('tomorrow');

  document.getElementById('schedule-list').innerHTML = '<div class="msg">🍊 讀取行事曆中...</div>';

  if (window._chiliCallback) window._chiliCallback = null;
  var old = document.getElementById('_gas_script');
  if (old) old.parentNode.removeChild(old);

  _jsonpTimer = setTimeout(function() {
    document.getElementById('schedule-list').innerHTML =
      '<div class="err">⚠️ 行事曆讀取逾時，請確認 GAS 設定</div>';
  }, 12000);

  window._chiliCallback = function(data) {
    clearTimeout(_jsonpTimer);
    if (!data.ok) {
      document.getElementById('schedule-list').innerHTML =
        '<div class="err">⚠️ 讀取失敗：' + (data.error || '未知錯誤') + '</div>';
      return;
    }
    var events = (data.events || []).filter(function(e){ return e.date === queryDate; });
    if (events.length === 0) {
      document.getElementById('schedule-list').innerHTML =
        '<div class="msg">' + label + '　尚無預約行程</div>';
      return;
    }
    var nowStr = getNow();
    document.getElementById('schedule-list').innerHTML =
      events.map(function(item, i){ return renderRow(item, i+1, nowStr); }).join('');
  };

  var s = document.createElement('script');
  s.id  = '_gas_script';
  s.src = GAS_URL + '?callback=_chiliCallback&date=' + queryDate + '&t=' + Date.now();
  document.body.appendChild(s);
}

// 啟動
fetchAndRender();
setInterval(updateClock, 10000);          // 時鐘每10秒
setInterval(fetchAndRender, 30 * 60 * 1000); // 每30分鐘重讀行事曆
setInterval(function(){                   // 整點＋半點重刷
  var m = new Date().getMinutes();
  if (m === 0 || m === 30) fetchAndRender();
}, 60000);
</script>
</body>
</html>
